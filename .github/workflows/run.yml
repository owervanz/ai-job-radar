name: AI Job Radar (hourly)

on:
  schedule:
    # Every hour, on the hour. GitHub may delay scheduled runs under load.
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (score but do not send Telegram messages)"
        required: false
        default: "false"

concurrency:
  group: job-radar-runtime
  cancel-in-progress: false

permissions:
  contents: read
  actions: write  # required to upload/download artifacts across runs

jobs:
  scan:
    name: Scan & notify
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore seen-jobs DB from previous run
        uses: actions/download-artifact@v4
        with:
          name: seen-jobs-db
          path: .
          github-token: ${{ secrets.GITHUB_TOKEN }}  # needed to fetch across runs
        continue-on-error: true  # first run has no artifact yet

      - name: Run AI Job Radar
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}   # optional — enables Groq as primary
          MIN_SCORE: ${{ vars.MIN_SCORE || '65' }}
          MAX_JOBS_PER_RUN: ${{ vars.MAX_JOBS_PER_RUN || '25' }}
          LOG_LEVEL: INFO
        run: |
          DRY_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then DRY_FLAG="--dry-run"; fi
          python -m ai_job_radar $DRY_FLAG

      - name: Upload seen-jobs DB for next run
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seen-jobs-db
          path: seen_jobs.db
          retention-days: 30
          overwrite: true
