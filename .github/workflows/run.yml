name: AI Job Radar (hourly)

on:
  schedule:
    # Every hour, on the hour. GitHub may delay scheduled runs under load.
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (score but do not send Telegram messages)"
        required: false
        default: "false"

concurrency:
  group: job-radar-runtime
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  scan:
    name: Scan & notify
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore seen-jobs DB
        # actions/cache persists across runs automatically.
        # Key rotates every run so the latest DB is always saved;
        # restore-keys picks up the most recent previous cache on miss.
        uses: actions/cache/restore@v4
        with:
          path: seen_jobs.db
          key: seen-jobs-db-${{ github.run_id }}
          restore-keys: seen-jobs-db-

      - name: Run AI Job Radar
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MIN_SCORE: ${{ vars.MIN_SCORE || '65' }}
          MAX_JOBS_PER_RUN: ${{ vars.MAX_JOBS_PER_RUN || '25' }}
          LOG_LEVEL: INFO
        run: |
          DRY_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then DRY_FLAG="--dry-run"; fi
          python -m ai_job_radar $DRY_FLAG

      - name: Save seen-jobs DB
        if: always()
        uses: actions/cache/save@v4
        with:
          path: seen_jobs.db
          key: seen-jobs-db-${{ github.run_id }}
