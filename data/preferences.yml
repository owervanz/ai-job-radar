# Preferences passed to the LLM scorer alongside the CV.
# These are NOT parsed structurally — the whole file is fed as text to the model.

candidate_location:
  city: Valparaíso
  country: Chile
  timezone: America/Santiago (UTC-3 / UTC-4 in summer)
  note: >
    Candidate is based in Chile. Roles that are LATAM-friendly, Americas timezone,
    or worldwide remote are all viable. International/global remote roles that pay
    in USD are especially desirable. Do NOT penalize for location unless the role
    explicitly requires on-site presence in another country.

current_employment:
  company: Hapag-Lloyd
  role: Senior IT
  status: >
    Currently employed full-time. The candidate wants to KEEP this job while breaking
    into AI. This means:
    - Contractor and freelance roles are IDEAL — can do both simultaneously.
    - Full-time AI roles are also interesting but require higher salary to justify leaving.
    - The #1 priority is getting real AI work experience, even if the first role pays less.
    - A lower-paying GenAI contractor role beats a higher-paying non-AI role every time.

target_market:
  - LATAM startups and scaleups (Chile, Argentina, Colombia, Mexico, Peru)
  - International companies hiring remotely in Americas timezone
  - US-based companies with LATAM-friendly remote policies

hard_preferences:
  - Must be FULLY REMOTE (worldwide, LATAM, or Americas — not on-site)
  - Seniority: Junior, Semi-Senior, or Mid-level (NOT Senior 5+ years unless GenAI/LLM specific)
  - AI focus: GenAI / LLM / RAG / LangChain / agents / prompt engineering / API integration
  - Stack overlap with: Python, Next.js, Supabase, Gemini/OpenAI/Anthropic APIs, Vercel
  - Salary: flexible — getting into AI is priority #1. Even USD 1000-1500/month freelance
    is acceptable if the role involves real GenAI/LLM work and builds the portfolio.

soft_preferences:
  - LATAM-based company or LATAM/Americas-friendly timezone
  - Fintech, SaaS, edtech, devtools or product startups
  - Mentions building AI products, not training models from scratch
  - Accepts B2 English (not strict C1)
  - Companies known to hire in Chile (Compara, Fintual, Bsale, Platzi, Globant, etc.)
  - Roles that value IT/infrastructure background alongside AI skills

hard_disqualifiers:
  - Strict requirement of 5+ years of professional ML engineering
  - Requires PhD or research background
  - Recommender systems / Computer Vision / NLP classical / deep ML as core (not LLM/GenAI)
  - Requires C1+ English explicitly
  - On-site only (anywhere physical)
  - MLOps Senior with SageMaker / Vertex / Kubeflow as hard requirement
  - Requires deep PyTorch / TensorFlow training experience from scratch
  - Unpaid or equity-only with no cash component
  - Below USD 400/month (not worth the time regardless of AI focus)
